<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reliable Water Services — Book a Service</title>
<link rel="icon" type="image/png" href="logo.png"/>
<meta http-equiv="refresh" content="0; url=client-registration.html"/>
<style>
body{font-family:'DM Sans',sans-serif;background:#1B3A5C;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.sp{text-align:center;color:#fff;animation:fi 0.5s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.lw{width:80px;height:80px;background:rgba(91,184,232,0.15);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.lw img{width:62px;height:62px;object-fit:contain;border-radius:10px;}
h1{font-size:1.5rem;margin:0 0 7px;color:#5BB8E8;font-weight:700;}
p{font-size:0.87rem;color:rgba(255,255,255,0.55);margin:0 0 18px;}
.spin{width:26px;height:26px;border:3px solid rgba(91,184,232,0.2);border-top-color:#5BB8E8;border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto;}
@keyframes sp{to{transform:rotate(360deg);}}
a{color:#5BB8E8;font-size:0.8rem;margin-top:14px;display:inline-block;}
</style>
</head>
<body>
<div class="sp">
  <div class="lw"><img src="logo.png" alt="RWS" onerror="this.parentElement.innerHTML='<span style=&quot;color:#5BB8E8;font-size:1.4rem;font-weight:700;&quot;>RWS</span>'"/></div>
  <h1>Reliable Water Services</h1>
  <p>Loading your service booking portal…</p>
  <div class="spin"></div><br/>
  <a href="client-registration.html">Click here if not redirected</a>
</div>
<script>
try{localStorage.removeItem('rwsc_submitted');}catch(e){}
setTimeout(()=>window.location.replace('client-registration.html'),600);
</script>
</body>
</html>
