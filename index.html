<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reliable Water Services Company — Book a Service</title>
<!-- Favicon -->
<link rel="icon" type="image/png" href="./logo.png"/>
<link rel="apple-touch-icon" href="./logo.png"/>
<meta name="theme-color" content="#1B3A5C"/>
<meta http-equiv="refresh" content="0; url=client-registration.html"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
body{font-family:'DM Sans',sans-serif;background:#1B3A5C;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.splash{text-align:center;color:white;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.logo-wrap{width:80px;height:80px;background:rgba(91,184,232,0.15);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.logo-wrap img{width:64px;height:64px;object-fit:contain;}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;margin:0 0 8px;color:#5BB8E8;}
p{font-size:0.9rem;color:rgba(255,255,255,0.6);margin:0 0 20px;}
.spinner{width:28px;height:28px;border:3px solid rgba(91,184,232,0.2);border-top-color:#5BB8E8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
a{color:#5BB8E8;font-size:0.82rem;margin-top:16px;display:inline-block;}
</style>
</head>
<body>
<div class="splash">
<div class="logo-wrap">
<img src="./logo.png" alt="RWS Logo" onerror="this.parentElement.innerHTML='<span style=&quot;color:#5BB8E8;font-size:1.5rem;font-weight:700;&quot;>RWS</span>'"/>
</div>
<h1>Reliable Water Services</h1>
<p>Loading your service booking portal…</p>
<div class="spinner"></div>
<br/>
<a href="client-registration.html">Click here if not redirected automatically</a>
</div>
<script>
// Clear any stale submission flag when visiting fresh
try { localStorage.removeItem('rwsc_submitted'); } catch(e) {}
setTimeout(() => { window.location.replace('client-registration.html'); }, 800);
</script>
</body>
</html>
